<!DOCTYPE html>
<!--
    Thymeleaf 네임스페이스 선언:
    xmlns:th="http://www.thymeleaf.org"
    th:* 속성들이 Thymeleaf 표현식으로 처리됩니다.
    이 속성이 없으면 브라우저는 th:* 를 무시하고 일반 HTML로 렌더링합니다.
    (내추럴 템플릿: 서버 없이 브라우저에서도 기본 레이아웃 확인 가능)
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 목록 - Product Management</title>
    <style>
        /* 학습에 집중하기 위한 간단한 인라인 스타일 */
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 16px; }
        .btn:hover { background: #357abd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; vertical-align: middle; }
        tr:hover { background: #f5f8ff; }
        .price { text-align: right; font-weight: bold; color: #e74c3c; }
        .detail-link { color: #4a90d9; text-decoration: none; }
        .detail-link:hover { text-decoration: underline; }
        .edit-link { color: #e67e22; text-decoration: none; margin-right: 8px; }
        .edit-link:hover { text-decoration: underline; }
        /* 삭제 버튼: HTML 폼 안에 있어야 POST 요청을 보낼 수 있습니다. */
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.95em; padding: 0; text-decoration: underline; }
        .btn-delete:hover { color: #c0392b; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 1.1em; }
        .search-box { background: #f5f8ff; border: 1px solid #d0dcef; padding: 14px 16px; border-radius: 6px; margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .search-box input[type=text], .search-box select { padding: 7px 10px; border: 1px solid #bbb; border-radius: 4px; font-size: 0.95em; }
        .search-box input[type=text] { flex: 1 1 220px; }
        .search-box button { padding: 7px 16px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .search-box .btn-reset { background: #95a5a6; text-decoration: none; color: white; padding: 7px 12px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>상품 목록</h1>

    <!--
        th:if="${successMessage}":
        Model에 successMessage 속성이 있을 때만 이 div를 렌더링합니다.
        RedirectAttributes.addFlashAttribute()로 전달된 값이 여기 표시됩니다.
        Flash 속성은 리다이렉트 후 딱 한 번 표시되고 자동으로 삭제됩니다.
    -->
    <div class="alert-success" th:if="${successMessage}">
        <span th:text="${successMessage}">성공 메시지</span>
    </div>

    <a class="btn" th:href="@{/products/create}">+ 새 상품 등록</a>
    <a class="btn" style="background:#7f8c8d;" th:href="@{/categories}">카테고리 관리</a>

    <form class="search-box" th:action="@{/products}" method="get">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="상품명 검색 (부분 일치)"/>
        <select name="categoryId">
            <option value="">-- 전체 카테고리 --</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${categoryId != null and cat.id == categoryId}"></option>
        </select>
        <button type="submit">검색</button>
        <a class="btn-reset" th:href="@{/products}">초기화</a>
    </form>

    <div class="empty-msg" th:if="${#lists.isEmpty(products)}">
        <span th:if="${(keyword != null and !keyword.isBlank()) or categoryId != null}">
            검색 결과가 없습니다.
        </span>
        <span th:unless="${(keyword != null and !keyword.isBlank()) or categoryId != null}">
            등록된 상품이 없습니다. 새 상품을 등록해 주세요.
        </span>
    </div>

    <table th:unless="${#lists.isEmpty(products)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>상품명</th>
                <th>카테고리</th>
                <th>가격</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody>
            <!--
                th:each="product, iterStat : ${products}":
                Java의 for-each 루프에 해당합니다.
                Controller에서 model.addAttribute("products", products)로
                전달한 List<Product>를 하나씩 순회합니다.
            -->
            <tr th:each="product : ${products}">
                <td th:text="${product.id}">1</td>
                <td>
                    <!--
                        상품명을 클릭하면 상세 페이지로 이동합니다.
                    -->
                    <a class="detail-link"
                       th:href="@{/products/{id}(id=${product.id})}"
                       th:text="${product.name}">상품명</a>
                </td>
                <td th:text="${product.category != null ? product.category.name : '-'}">카테고리</td>

                <!--
                    #numbers.formatDecimal(): Thymeleaf 내장 유틸리티 객체
                    숫자를 형식화합니다: 소수점 0자리, 천단위 구분자 적용
                    결과 예: 15000.00 → "15,000"
                -->
                <td class="price"
                    th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')} + '원'">
                    15,000원
                </td>

                <td>
                    <!--
                        수정 링크: GET /products/{id}/edit
                    -->
                    <a class="edit-link"
                       th:href="@{/products/{id}/edit(id=${product.id})}">수정</a>

                    <!--
                        삭제 폼:
                        HTML <form>은 GET/POST만 지원합니다.
                        HTTP DELETE를 사용하려면 REST API + JS fetch가 필요합니다.
                        여기서는 학습 목적으로 POST 방식을 사용합니다.

                        onsubmit: 브라우저의 confirm() 대화상자로 삭제 확인을 요청합니다.
                          - 확인 클릭 → true 반환 → 폼 제출
                          - 취소 클릭 → false 반환 → 폼 제출 취소
                    -->
                    <form th:action="@{/products/{id}/delete(id=${product.id})}"
                          method="post"
                          style="display: inline;"
                          onsubmit="return confirm('정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.');">
                        <button type="submit" class="btn-delete">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <div style="padding:10px; background:#f5f5f5; border-bottom:1px solid #ddd;">
        <span th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
        <span> | 학번: 2291127</span>
        <span> | 성명: 안태환</span>
    </div>
</body>
</html>
