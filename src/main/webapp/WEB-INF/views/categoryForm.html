<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        form { margin-top: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
        .btn { display: inline-block; padding: 10px 20px; background: #4a90d9; color: white; text-decoration: none; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        .btn:hover { background: #357abd; }
        .btn-secondary { background: #95a5a6; margin-left: 8px; }
        .btn-secondary:hover { background: #7f8c8d; }
        .error-msg { color: #e74c3c; font-size: 0.9em; margin-top: 4px; display: block; }
        .field-error input { border-color: #e74c3c; }
    </style>
</head>
<body>

    <h1>카테고리 등록</h1>

    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">

        <div class="form-group" th:classappend="${#fields.hasErrors('name')} ? 'field-error' : ''">
            <label for="name">카테고리 이름</label>
            <input type="text" th:field="*{name}" placeholder="예: 전자제품"/>
            <span class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">이름 오류</span>
        </div>

        <button type="submit" class="btn">등록</button>
        <a class="btn btn-secondary" th:href="@{/categories}">취소</a>
    </form>

    <div style="padding:10px; background:#f5f5f5; border-bottom:1px solid #ddd; margin-top: 40px;">
        <span th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
        <span> | 학번: 2291127</span>
        <span> | 성명: 안태환</span>
    </div>
</body>
</html>
